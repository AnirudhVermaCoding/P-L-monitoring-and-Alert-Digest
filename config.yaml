# Business rules and routing for the FC P&L monitor.
# Editable by a non-technical user. All ranges are % of revenue.

# Per-line-item target ranges (from the "Ideal FC Criteria" sheet).
targets:
  Manpower:          {min: 25, max: 27}
  Packaging:         {min: 5,  max: 7}
  Power and Fuel:    {min: 10, max: 12}
  FC Rent:           {min: 15, max: 18}
  Equipment Rentals: {min: 5,  max: 8}
  Overheads:         {min: 10, max: 12}

# Contribution-margin target bands and the allowed +/- deviation (percentage points).
margins:
  cm1: {min: 65, max: 70, tolerance_pp: 3}   # breach if CM1% < 62 or > 73
  cm2: {min: 15, max: 30, tolerance_pp: 3}   # breach if CM2% < 12 or > 33

# Daily colour code thresholds for CM2% (see brief).
colors:
  red_below: 12        # CM2 < 12        -> Red
  yellow_low: 15       # 12 <= CM2 < 15  -> Yellow
  green_high: 30       # 15 <= CM2 <= 30 -> Green
  yellow_high: 33      # 30 < CM2 <= 33  -> Yellow
  # CM2 > 33           -> Blue (suspicious: check for under-reported costs)

# Who gets notified when a specific cost line breaches its range.
# NOTE: these are live recipient inboxes used for the smtp email demo. Edit to suit.
owners:
  Manpower:          cashivangagrawal@gmail.com
  Packaging:         anirudhverma712007@gmail.com
  Power and Fuel:    shalinisharma71359@gmail.com
  FC Rent:           anirudhverma712007@gmail.com
  Equipment Rentals: anirudhverma712007@gmail.com
  Overheads:         anirudhverma712007@gmail.com

# Who gets the daily colour-coded digest for each FC.
fc_managers:
  default: anirudhverma712007@gmail.com
  FC-Delhi:  cashivangagrawal@gmail.com
  FC-Mumbai: anirudhverma712007@gmail.com

# How owner alerts are batched, so nobody gets one email per breach.
notifications:
  scope: latest_day        # latest_day = alert on each FC's most recent day only; all_days = whole batch
  materiality_pp: 1.0      # a line item must breach its range by >= this many pp to page its owner
  always_page_cm_breach: true   # reserved: CM1/CM2 breaches always matter (surfaced via the FC digest)
